
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lynx Media Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Outfit', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#f9ffe0',
                100: '#f0ffbe',
                200: '#e2ff8c',
                300: '#d0ff4f',
                400: '#ccff00', // Lynx Neon
                500: '#aacc00', // Solid Lime
                600: '#88aa00', // Darker Lime
                700: '#668000', // Text Legible
                800: '#485a00',
                900: '#2a3500',
                950: '#1a2200',
              },
              // Replacing Slate with Zinc/Neutral logic for "Black" theme feel
              slate: {
                50: '#fafafa',
                100: '#f4f4f5',
                200: '#e4e4e7',
                300: '#d4d4d8',
                400: '#a1a1aa',
                500: '#71717a',
                600: '#52525b',
                700: '#3f3f46',
                800: '#27272a',
                850: '#202023',
                900: '#18181b',
                950: '#09090b',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #f8fafc;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .dark body {
        background-color: #000000; /* Pure Black */
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Outfit', sans-serif;
      }
      /* Custom scrollbar for tables */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f4f4f5;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-track {
        background: #000000;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #d4d4d8;
        border-radius: 3px;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #3f3f46;
      }
      .animate-fadeIn {
        animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Recharts Dark Mode Overrides */
      .dark .recharts-default-tooltip {
        background-color: #18181b !important; /* Zinc 900 */
        border-color: #27272a !important; /* Zinc 800 */
        color: #f4f4f5 !important;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.8);
        border-radius: 8px;
      }
      .dark .recharts-tooltip-item {
        color: #e4e4e7 !important;
      }
      .dark .recharts-cartesian-grid-horizontal line,
      .dark .recharts-cartesian-grid-vertical line {
        stroke: #3f3f46; /* Zinc 700 - Visible on black */
        opacity: 0.3;
      }
      .dark .recharts-text {
        fill: #e4e4e7; /* Zinc 200 - White text for Axes */
      }
      .dark .recharts-legend-item-text {
        color: #e4e4e7 !important; /* Zinc 200 - White text for Legend */
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.560.0",
    "recharts": "https://esm.sh/recharts@^3.5.1",
    "react/": "https://esm.sh/react@^19.2.1/",
    "react": "https://esm.sh/react@^19.2.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.1/",
    "xlsx": "https://cdn.sheetjs.com/xlsx-0.20.1/package/xlsx.mjs",
    "react-dom": "https://esm.sh/react-dom@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
